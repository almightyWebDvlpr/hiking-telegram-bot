name: Deploy Hiking Bot

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Deploy prod
        env:
          PROD_TARGET_DIR: ${{ vars.PROD_TARGET_DIR }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          GIT_BRANCH: main
        shell: cmd
        run: |
          if "%RUNNER_TEMP%"=="" (
            set "WORK_ROOT=%TEMP%"
          ) else (
            set "WORK_ROOT=%RUNNER_TEMP%"
          )
          set "WORK_DIR=%WORK_ROOT%\workflow-deploy-prod"
          if exist "%WORK_DIR%" rmdir /S /Q "%WORK_DIR%"
          git clone --branch "%GIT_BRANCH%" --single-branch "%REPO_URL%" "%WORK_DIR%"
          if errorlevel 1 exit /b 1
          call "%WORK_DIR%\scripts\deploy-prod.cmd"

  deploy-test:
    if: github.ref == 'refs/heads/develop'
    runs-on: self-hosted
    steps:
      - name: Deploy test
        env:
          TEST_TARGET_DIR: ${{ vars.TEST_TARGET_DIR }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          GIT_BRANCH: develop
        shell: cmd
        run: |
          if "%RUNNER_TEMP%"=="" (
            set "WORK_ROOT=%TEMP%"
          ) else (
            set "WORK_ROOT=%RUNNER_TEMP%"
          )
          set "WORK_DIR=%WORK_ROOT%\workflow-deploy-test"
          if exist "%WORK_DIR%" rmdir /S /Q "%WORK_DIR%"
          git clone --branch "%GIT_BRANCH%" --single-branch "%REPO_URL%" "%WORK_DIR%"
          if errorlevel 1 exit /b 1
          call "%WORK_DIR%\scripts\deploy-test.cmd"
